name: Crawl CFPs & Score

on:
  schedule:
    # Run daily at 6:00 AM UTC (7:00 AM WAT)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_crawl:
        description: 'Force re-crawl all sources'
        required: false
        default: 'false'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  crawl-score-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Step 1 — Crawl CFPs from all sources
        run: python scripts/crawl_cfps.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}

      - name: Step 2 — Score & match CFPs against profile
        run: python scripts/match_score.py

      - name: Step 3 — Generate draft applications
        run: python scripts/generate_applications.py

      - name: Step 4 — Build dashboard data
        run: python scripts/build_dashboard_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/data/
          if git diff --staged --quiet; then
            echo "No data changes detected"
          else
            git commit -m "chore: update CFP data — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
