<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speaking Intel - Ayoade Adegbite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --surface2:  #263348;
      --border:    #334155;
      --text:      #f1f5f9;
      --muted:     #94a3b8;
      --gold:      #d4a053;
      --gold-dim:  rgba(212,160,83,.12);
      --blue:      #3b82f6;
      --amber:     #f59e0b;
      --red:       #ef4444;
      --green:     #10b981;
      --purple:    #8b5cf6;
      --cyan:      #06b6d4;
      --font-head: 'Fira Code', monospace;
      --font-body: 'Fira Sans', sans-serif;
      --radius:    10px;
      --shadow:    0 4px 24px rgba(0,0,0,.35);
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; line-height: 1.6; }

    .layout { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 24px 0; position: sticky; top: 0; height: 100vh; overflow-y: auto;
    }
    .sidebar-logo {
      padding: 0 20px 24px;
      font-family: var(--font-head);
      font-size: 16px; font-weight: 700;
      color: var(--gold);
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo span { color: var(--muted); font-size: 11px; font-weight: 400; display: block; margin-top: 2px; }
    .sidebar-section { padding: 20px 20px 8px; font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .sidebar-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 20px; cursor: pointer;
      font-size: 13px; font-weight: 500; color: var(--muted);
      transition: background .15s, color .15s;
      border-left: 3px solid transparent;
    }
    .sidebar-item:hover { background: var(--surface2); color: var(--text); }
    .sidebar-item.active { background: var(--gold-dim); color: var(--gold); border-left-color: var(--gold); }
    .sidebar-item svg { flex-shrink: 0; opacity: .8; }

    .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }

    /* Topbar */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 20;
    }
    .topbar-title { font-family: var(--font-head); font-size: 16px; font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .badge {
      background: var(--gold-dim); color: var(--gold);
      border: 1px solid rgba(212,160,83,.3);
      border-radius: 20px; padding: 3px 12px;
      font-size: 11px; font-weight: 600;
    }
    .badge-live { background: rgba(16,185,129,.12); color: var(--green); border-color: rgba(16,185,129,.3); }
    .refresh-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px; padding: 6px 12px;
      font-family: var(--font-body); font-size: 12px; cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .refresh-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* Content */
    .content { padding: 24px 28px; flex: 1; }
    .dashboard { display: none; }
    .dashboard.active { display: block; }

    /* KPI */
    .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 20px; }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      box-shadow: var(--shadow);
      transition: border-color .2s;
    }
    .kpi-card:hover { border-color: var(--gold); }
    .kpi-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .kpi-value { font-family: var(--font-head); font-size: 24px; font-weight: 700; color: var(--text); line-height: 1.1; }
    .kpi-value.gold  { color: var(--gold); }
    .kpi-value.green { color: var(--green); }
    .kpi-value.amber { color: var(--amber); }
    .kpi-value.red   { color: var(--red); }
    .kpi-value.blue  { color: var(--blue); }
    .kpi-value.purple { color: var(--purple); }
    .kpi-delta { font-size: 11px; color: var(--muted); margin-top: 5px; }

    /* Charts */
    .chart-row { display: grid; gap: 14px; margin-bottom: 20px; align-items: stretch; }
    .cols-3 { grid-template-columns: repeat(3, 1fr); }
    .cols-2 { grid-template-columns: repeat(2, 1fr); }
    .cols-2-1 { grid-template-columns: 2fr 1fr; }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px 14px;
      box-shadow: var(--shadow);
      display: flex; flex-direction: column;
    }
    .chart-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
    .chart-title { font-size: 13px; font-weight: 600; color: var(--text); }
    .chart-wrap { position: relative; flex: 1; display: flex; align-items: center; }
    .chart-wrap canvas { width: 100% !important; }

    .section-heading { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

    /* Status pills */
    .status-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .status-pill {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 16px;
      font-size: 12px; color: var(--muted);
    }
    .status-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-pill .count { font-family: var(--font-head); font-weight: 700; color: var(--text); }

    /* Table */
    .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .data-table th {
      text-align: left; padding: 10px 12px;
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
    .data-table tr:hover td { background: rgba(212,160,83,.04); }

    /* Badges */
    .status-badge {
      display: inline-block; padding: 2px 10px; border-radius: 12px;
      font-size: 10px; font-weight: 600; text-transform: uppercase;
    }
    .status-badge.draft     { background: rgba(148,163,184,.12); color: var(--muted); }
    .status-badge.submitted { background: rgba(59,130,246,.12); color: var(--blue); }
    .status-badge.accepted  { background: rgba(16,185,129,.12); color: var(--green); }
    .status-badge.rejected  { background: rgba(239,68,68,.12); color: var(--red); }
    .status-badge.expired   { background: rgba(148,163,184,.08); color: #475569; }
    .status-badge.withdrawn { background: rgba(245,158,11,.12); color: var(--amber); }
    .status-badge.open      { background: rgba(16,185,129,.12); color: var(--green); }
    .priority-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
    .priority-badge.high   { background: rgba(239,68,68,.12); color: var(--red); }
    .priority-badge.medium { background: rgba(245,158,11,.12); color: var(--amber); }
    .priority-badge.low    { background: rgba(148,163,184,.12); color: var(--muted); }

    /* Travel sponsorship badges */
    .travel-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 12px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
    .travel-badge.yes     { background: rgba(16,185,129,.12); color: var(--green); }
    .travel-badge.partial { background: rgba(245,158,11,.12); color: var(--amber); }
    .travel-badge.no      { background: rgba(239,68,68,.12); color: var(--red); }
    .travel-badge.unknown { background: rgba(148,163,184,.08); color: #475569; }
    .travel-badge svg { width: 12px; height: 12px; }
    .travel-icon { display: inline-block; font-size: 13px; }

    /* Score bar */
    .score-bar { display: flex; align-items: center; gap: 8px; }
    .score-bar-track { width: 60px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
    .score-bar-val { font-family: var(--font-head); font-size: 11px; font-weight: 600; min-width: 32px; }

    /* Tag cloud */
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 0; }
    .tag-pill {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 14px; padding: 4px 12px;
      font-size: 11px; color: var(--muted);
      transition: border-color .2s, color .2s;
    }
    .tag-pill:hover { border-color: var(--gold); color: var(--gold); }
    .tag-pill .tag-count { font-family: var(--font-head); font-weight: 600; color: var(--text); margin-left: 6px; font-size: 10px; }

    /* CFP link */
    .cfp-link { color: var(--gold); text-decoration: none; font-weight: 500; }
    .cfp-link:hover { text-decoration: underline; }

    /* Deadline */
    .deadline-urgent { color: var(--red); font-weight: 600; }
    .deadline-soon { color: var(--amber); }
    .deadline-ok { color: var(--green); }

    /* Loading */
    .loading-overlay { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; min-height: 300px; color: var(--muted); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fetch-error { color: var(--red); text-align: center; padding: 40px; }

    /* Acceptance rate ring */
    .rate-ring { position: relative; width: 120px; height: 120px; margin: 0 auto; }
    .rate-ring canvas { width: 120px !important; height: 120px !important; }
    .rate-ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .rate-ring-value { font-family: var(--font-head); font-size: 28px; font-weight: 700; color: var(--gold); }
    .rate-ring-text { font-size: 10px; color: var(--muted); text-transform: uppercase; }

    /* Mobile topbar */
    .mobile-topbar { display: none; }
    .mobile-bottom-nav { display: none; }

    @media (max-width: 1024px) {
      .kpi-row { grid-template-columns: repeat(3, 1fr); }
      .cols-3 { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .topbar { display: none; }

      .mobile-topbar {
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 16px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        position: sticky; top: 0; z-index: 30;
      }
      .mobile-topbar-title { font-family: var(--font-head); font-size: 14px; font-weight: 600; color: var(--gold); }
      .mobile-refresh-btn {
        background: var(--surface2); border: 1px solid var(--border);
        color: var(--muted); border-radius: 6px;
        width: 32px; height: 32px;
        display: flex; align-items: center; justify-content: center; cursor: pointer;
      }

      .mobile-bottom-nav {
        display: flex;
        position: fixed; bottom: 0; left: 0; right: 0;
        background: var(--surface);
        border-top: 1px solid var(--border);
        padding: 8px 4px; padding-bottom: calc(8px + env(safe-area-inset-bottom));
        z-index: 30;
      }
      .mobile-nav-item {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; gap: 4px; padding: 6px 2px;
        background: none; border: none;
        color: var(--muted); cursor: pointer;
        font-family: var(--font-body); font-size: 9px;
      }
      .mobile-nav-item svg { width: 20px; height: 20px; }
      .mobile-nav-item.active { color: var(--gold); }

      .kpi-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .kpi-card { padding: 14px; }
      .kpi-value { font-size: 20px; }
      .cols-3, .cols-2, .cols-2-1 { grid-template-columns: 1fr; }
      .content { padding: 16px 12px 100px; }
    }
  </style>
</head>
<body>

    </div>

    <div style="flex:1"></div>
    <div style="padding:16px 20px;border-top:1px solid var(--border)">
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Powered by</div>
      <div style="font-size:12px;color:var(--gold);font-family:var(--font-head)">GitHub Actions</div>

  <!-- Main -->

          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>

<script>
/* ────────────────────────────────────
   CONFIG & STATE
──────────────────────────────────── */
let DATA = null;
const DATA_URL = 'data/dashboard_data.json';

const GOLD='#d4a053', GREEN='#10b981', BLUE='#3b82f6', AMBER='#f59e0b',
      RED='#ef4444', PURPLE='#8b5cf6', CYAN='#06b6d4', GRID='rgba(51,65,85,.5)', TICK='#94a3b8';

Chart.defaults.color = TICK;
Chart.defaults.font.family = "'Fira Sans', sans-serif";
Chart.defaults.font.size = 11;

const charts = {};
function makeChart(id,cfg){
  if(charts[id]){charts[id].destroy();delete charts[id];}
  const el=document.getElementById(id);if(!el)return;
  const hasData=cfg.data&&cfg.data.datasets&&cfg.data.datasets.some(ds=>ds.data&&ds.data.some(v=>v>0));
  const wrap=el.parentElement;
  const existing=wrap.querySelector('.no-data');if(existing)existing.remove();
  if(!hasData){el.style.display='none';const msg=document.createElement('div');msg.className='no-data';msg.style.cssText='display:flex;align-items:center;justify-content:center;width:100%;min-height:120px;color:var(--muted);font-size:13px;font-style:italic;';msg.textContent='No data yet \u2014 run the crawler first';wrap.appendChild(msg);return;}
  el.style.display='';charts[id]=new Chart(el,cfg);
}

function baseOpts(extra={}){return{responsive:true,maintainAspectRatio:true,plugins:{legend:{labels:{boxWidth:10,padding:14}},tooltip:{backgroundColor:'#0f172a',borderColor:'#334155',borderWidth:1,padding:10}},scales:{x:{grid:{color:GRID},ticks:{color:TICK}},y:{grid:{color:GRID},ticks:{color:TICK}}},...extra};}
function noLegend(o){o.plugins.legend.display=false;return o;}
function donutOpts(){return{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'right',labels:{boxWidth:10,padding:12}},tooltip:{backgroundColor:'#0f172a',borderColor:'#334155',borderWidth:1}}};}

function statusBadge(s){return `<span class="status-badge ${s}">${s}</span>`;}
function priorityBadge(p){return `<span class="priority-badge ${p}">${p}</span>`;}

function travelBadge(t){
  const labels={yes:'Sponsored',partial:'Maybe',no:'Not Covered',unknown:'Unknown'};
  const icons={yes:'\u2708',partial:'\u2753',no:'\u2718',unknown:'\u2014'};
  const cls=t||'unknown';
  return `<span class="travel-badge ${cls}"><span class="travel-icon">${icons[cls]||'\u2014'}</span>${labels[cls]||'Unknown'}</span>`;
}

function scoreBar(score){
  const pct=Math.round(score*100);
  const color=score>=0.6?GREEN:score>=0.4?AMBER:TICK;
  return `<div class="score-bar"><div class="score-bar-track"><div class="score-bar-fill" style="width:${pct}%;background:${color}"></div></div><span class="score-bar-val" style="color:${color}">${pct}%</span></div>`;
}

function deadlineClass(dateStr){
  if(!dateStr)return '';
  const d=(new Date(dateStr)-new Date())/(1000*60*60*24);
  if(d<0)return 'expired';
  if(d<=7)return 'deadline-urgent';
  if(d<=14)return 'deadline-soon';
  return 'deadline-ok';
}

function daysUntil(dateStr){
  if(!dateStr)return 'Unknown';
  const d=Math.ceil((new Date(dateStr)-new Date())/(1000*60*60*24));
  if(d<0)return 'Expired';
  if(d===0)return 'Today';
  if(d===1)return 'Tomorrow';
  return d+' days';
}

function fmtDate(iso){
  if(!iso)return '\u2014';
  try{return new Date(iso).toLocaleDateString('en-NG',{month:'short',day:'numeric',year:'numeric'});}catch{return iso;}
}

/* ────────────────────────────────────
   DATA LOADING
──────────────────────────────────── */
async function loadData(){
  const el=document.getElementById('dash-overview');
  el.innerHTML='<div class="loading-overlay"><div class="spinner"></div>Loading dashboard data...</div>';
  try{
    const resp=await fetch(DATA_URL+'?t='+Date.now());
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    DATA=await resp.json();
    updateBadges();
    renderAll();
  }catch(err){
    console.error(err);
    el.innerHTML=`<div class="fetch-error"><p style="font-size:18px;margin-bottom:8px">No data available</p><p>Run the GitHub Action crawler first, or check that <code>data/dashboard_data.json</code> exists.</p><p style="margin-top:16px;font-size:12px;color:var(--muted)">Error: ${err.message}</p></div>`;
  }
}

function updateBadges(){
  if(!DATA)return;
  const s=DATA.summary||{};
  document.getElementById('badge-status').textContent=`${s.total_applications||0} Applications \u00B7 ${s.acceptance_rate||0}% Rate`;
  document.getElementById('badge-crawl').textContent=`${s.open_cfps||0} Open CFPs`;
  const last=DATA.generated_at?fmtDate(DATA.generated_at):'Never';
  document.getElementById('last-update-sidebar').textContent='Updated: '+last;

/* ────────────────────────────────────

──────────────────────────────────── */
const tabNames={overview:'Overview',cfps:'Discovered CFPs',applications:'Applications',talks:'Talk Performance',deadlines:'Upcoming Deadlines','raw-cfps':'All CFPs'};

function switchTab(name){
  document.querySelectorAll('.dashboard').forEach(d=>d.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active'));
  document.querySelectorAll('.mobile-nav-item').forEach(i=>i.classList.remove('active'));
  const dash=document.getElementById('dash-'+name);
  if(dash)dash.classList.add('active');
  const sideItem=document.querySelector(`.sidebar-item[data-tab="${name}"]`);
  if(sideItem)sideItem.classList.add('active');
  const mobItem=document.querySelector(`.mobile-nav-item[data-tab="${name}"]`);
  if(mobItem)mobItem.classList.add('active');
  document.getElementById('topbar-title').textContent=tabNames[name]||name;
  window.scrollTo({top:0,behavior:'smooth'});
}
