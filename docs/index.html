<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speaking Intel - Ayoade Adegbite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0f172a; --surface:#1e293b; --surface2:#263348; --border:#334155;
      --text:#f1f5f9; --muted:#94a3b8; --gold:#d4a053; --gold-dim:rgba(212,160,83,.12);
      --blue:#3b82f6; --amber:#f59e0b; --red:#ef4444; --green:#10b981;
      --purple:#8b5cf6; --cyan:#06b6d4;
      --font-head:'Fira Code',monospace; --font-body:'Fira Sans',sans-serif;
      --radius:10px; --shadow:0 4px 24px rgba(0,0,0,.35);
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.6;}
    .layout{display:flex;min-height:100vh;}

    /* Sidebar */
    .sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;position:sticky;top:0;height:100vh;overflow-y:auto;}
    .sidebar-logo{padding:0 20px 24px;font-family:var(--font-head);font-size:16px;font-weight:700;color:var(--gold);border-bottom:1px solid var(--border);}
    .sidebar-logo span{color:var(--muted);font-size:11px;font-weight:400;display:block;margin-top:2px;}
    .sidebar-section{padding:20px 20px 8px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
    .sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:background .15s,color .15s;border-left:3px solid transparent;}
    .sidebar-item:hover{background:var(--surface2);color:var(--text);}
    .sidebar-item.active{background:var(--gold-dim);color:var(--gold);border-left-color:var(--gold);}
    .sidebar-item svg{flex-shrink:0;opacity:.8;}

    .main{flex:1;display:flex;flex-direction:column;overflow-y:auto;}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
    .topbar-title{font-family:var(--font-head);font-size:16px;font-weight:600;}
    .topbar-right{display:flex;align-items:center;gap:12px;}
    .badge{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(212,160,83,.3);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:600;}
    .badge-live{background:rgba(16,185,129,.12);color:var(--green);border-color:rgba(16,185,129,.3);}
    .refresh-btn{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:6px 12px;font-family:var(--font-body);font-size:12px;cursor:pointer;transition:border-color .2s,color .2s;}
    .refresh-btn:hover{border-color:var(--gold);color:var(--gold);}

    .content{padding:24px 28px;flex:1;}
    .dashboard{display:none;}
    .dashboard.active{display:block;}

    /* KPI */
    .kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px;}
    .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);transition:border-color .2s;}
    .kpi-card:hover{border-color:var(--gold);}
    .kpi-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
    .kpi-value{font-family:var(--font-head);font-size:24px;font-weight:700;line-height:1.1;}
    .kpi-delta{font-size:11px;color:var(--muted);margin-top:5px;}
    .gold{color:var(--gold);} .green{color:var(--green);} .amber{color:var(--amber);} .red{color:var(--red);} .blue{color:var(--blue);}

    /* Charts */
    .chart-row{display:grid;gap:14px;margin-bottom:20px;align-items:stretch;}
    .cols-3{grid-template-columns:repeat(3,1fr);} .cols-2{grid-template-columns:repeat(2,1fr);}
    .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px 14px;box-shadow:var(--shadow);display:flex;flex-direction:column;}
    .chart-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;}
    .chart-title{font-size:13px;font-weight:600;color:var(--text);}
    .chart-wrap{position:relative;flex:1;display:flex;align-items:center;}
    .chart-wrap canvas{width:100% !important;}
    .section-heading{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}

    /* Table */
    .data-table{width:100%;border-collapse:collapse;font-size:12px;}
    .data-table th{text-align:left;padding:10px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);}
    .data-table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);}
    .data-table tr:hover td{background:rgba(212,160,83,.04);}

    /* Badges */
    .status-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:10px;font-weight:600;text-transform:uppercase;}
    .status-badge.draft{background:rgba(148,163,184,.12);color:var(--muted);}
    .status-badge.submitted{background:rgba(59,130,246,.12);color:var(--blue);}
    .status-badge.accepted{background:rgba(16,185,129,.12);color:var(--green);}
    .status-badge.rejected{background:rgba(239,68,68,.12);color:var(--red);}
    .status-badge.expired{background:rgba(148,163,184,.08);color:#475569;}

    .travel-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:12px;font-size:10px;font-weight:600;text-transform:uppercase;}
    .travel-badge.yes{background:rgba(16,185,129,.12);color:var(--green);}
    .travel-badge.partial{background:rgba(245,158,11,.12);color:var(--amber);}
    .travel-badge.no{background:rgba(239,68,68,.12);color:var(--red);}
    .travel-badge.unknown{background:rgba(148,163,184,.08);color:#475569;}

    .priority-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:10px;font-weight:600;text-transform:uppercase;}
    .priority-badge.high{background:rgba(239,68,68,.12);color:var(--red);}
    .priority-badge.medium{background:rgba(245,158,11,.12);color:var(--amber);}
    .priority-badge.low{background:rgba(148,163,184,.12);color:var(--muted);}

    .cfp-link{color:var(--gold);text-decoration:none;font-weight:500;}
    .cfp-link:hover{text-decoration:underline;}
    .deadline-urgent{color:var(--red);font-weight:600;}
    .deadline-soon{color:var(--amber);}
    .deadline-ok{color:var(--green);}

    /* Score bar */
    .score-bar{display:flex;align-items:center;gap:8px;}
    .score-bar-track{width:60px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
    .score-bar-fill{height:100%;border-radius:3px;}
    .score-bar-val{font-family:var(--font-head);font-size:11px;font-weight:600;min-width:32px;}

    /* Action buttons */
    .action-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s;font-family:var(--font-body);text-decoration:none;}
    .action-btn.submit{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.3);color:var(--blue);}
    .action-btn.submit:hover{background:rgba(59,130,246,.25);border-color:var(--blue);}
    .action-btn.apply{background:rgba(212,160,83,.12);border-color:rgba(212,160,83,.3);color:var(--gold);}
    .action-btn.apply:hover{background:rgba(212,160,83,.25);border-color:var(--gold);}
    .action-btn.done{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.3);color:var(--green);cursor:default;}

    /* Filter bar */
    .filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
    .filter-btn{padding:5px 14px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .15s;}
    .filter-btn:hover{border-color:var(--gold);color:var(--text);}
    .filter-btn.active{background:var(--gold-dim);border-color:rgba(212,160,83,.4);color:var(--gold);}

    /* Loading */
    .loading-overlay{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;min-height:300px;color:var(--muted);}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .fetch-error{color:var(--red);text-align:center;padding:40px;}

    /* Mobile */
    .mobile-topbar{display:none;} .mobile-bottom-nav{display:none;}
    @media(max-width:1024px){.kpi-row{grid-template-columns:repeat(3,1fr);}.cols-3{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:768px){
      .sidebar{display:none;}.topbar{display:none;}
      .mobile-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:30;}
      .mobile-topbar-title{font-family:var(--font-head);font-size:14px;font-weight:600;color:var(--gold);}
      .mobile-refresh-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:6px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
      .mobile-bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:8px 4px;padding-bottom:calc(8px + env(safe-area-inset-bottom));z-index:30;}
      .mobile-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 2px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:var(--font-body);font-size:9px;}
      .mobile-nav-item svg{width:20px;height:20px;} .mobile-nav-item.active{color:var(--gold);}
      .kpi-row{grid-template-columns:repeat(2,1fr);gap:10px;} .kpi-card{padding:14px;} .kpi-value{font-size:20px;}
      .cols-3,.cols-2{grid-template-columns:1fr;} .content{padding:16px 12px 100px;}
    }
  </style>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">Speaking Intel<span>Ayoade Adegbite</span></div>
    <div class="sidebar-section">Views</div>
    <div class="sidebar-item active" onclick="switchTab('overview')" data-tab="overview">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 5-5"/></svg>
      Overview
    </div>
    <div class="sidebar-item" onclick="switchTab('board')" data-tab="board">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M8 7h8M8 11h8M8 15h4"/></svg>
      Action Board
    </div>
    <div class="sidebar-item" onclick="switchTab('deadlines')" data-tab="deadlines">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      Deadlines
    </div>
    <div style="flex:1"></div>
    <div class="sidebar-section">Actions</div>
    <a class="sidebar-item" href="https://github.com/tripleaceme/speaking-engagement-intel/actions/workflows/crawl-and-score.yml" target="_blank" style="text-decoration:none">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      Run Crawler
    </a>
    <div style="padding:16px 20px;border-top:1px solid var(--border);margin-top:8px">
      <div style="font-size:10px;color:var(--muted)" id="last-update-sidebar">Last crawl: never</div>
    </div>
  </nav>

  <div class="main">
    <header class="mobile-topbar">
      <div class="mobile-topbar-title">Speaking Intel</div>
      <button class="mobile-refresh-btn" onclick="loadData()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      </button>
    </header>
    <header class="topbar">
      <div class="topbar-title" id="topbar-title">Overview</div>
      <div class="topbar-right">
        <span class="badge" id="badge-status">Loading...</span>
        <span class="badge badge-live" id="badge-crawl">-</span>
        <button class="refresh-btn" onclick="loadData()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
          Refresh
        </button>
      </div>
    </header>
    <div class="content">
      <div class="dashboard active" id="dash-overview"></div>
      <div class="dashboard" id="dash-board"></div>
      <div class="dashboard" id="dash-deadlines"></div>
    </div>
  </div>

  <nav class="mobile-bottom-nav">
    <button class="mobile-nav-item active" data-tab="overview" onclick="switchTab('overview')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 5-5"/></svg><span>Overview</span>
    </button>
    <button class="mobile-nav-item" data-tab="board" onclick="switchTab('board')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M8 7h8"/></svg><span>Action Board</span>
    </button>
    <button class="mobile-nav-item" data-tab="deadlines" onclick="switchTab('deadlines')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span>Deadlines</span>
    </button>
  </nav>
</div>

<script>
const REPO='tripleaceme/speaking-engagement-intel';
const DATA_URL='data/dashboard_data.json';
let DATA=null;
const GOLD='#d4a053',GREEN='#10b981',BLUE='#3b82f6',AMBER='#f59e0b',RED='#ef4444',PURPLE='#8b5cf6',CYAN='#06b6d4',GRID='rgba(51,65,85,.5)',TICK='#94a3b8';
Chart.defaults.color=TICK;Chart.defaults.font.family="'Fira Sans',sans-serif";Chart.defaults.font.size=11;

const charts={};
function makeChart(id,cfg){if(charts[id]){charts[id].destroy();delete charts[id];}const el=document.getElementById(id);if(!el)return;const hasData=cfg.data&&cfg.data.datasets&&cfg.data.datasets.some(ds=>ds.data&&ds.data.some(v=>v>0));const wrap=el.parentElement;const ex=wrap.querySelector('.no-data');if(ex)ex.remove();if(!hasData){el.style.display='none';const msg=document.createElement('div');msg.className='no-data';msg.style.cssText='display:flex;align-items:center;justify-content:center;width:100%;min-height:120px;color:var(--muted);font-size:13px;font-style:italic;';msg.textContent='No data yet';wrap.appendChild(msg);return;}el.style.display='';charts[id]=new Chart(el,cfg);}
function baseOpts(extra={}){return{responsive:true,maintainAspectRatio:true,plugins:{legend:{labels:{boxWidth:10,padding:14}},tooltip:{backgroundColor:'#0f172a',borderColor:'#334155',borderWidth:1,padding:10}},scales:{x:{grid:{color:GRID},ticks:{color:TICK}},y:{grid:{color:GRID},ticks:{color:TICK}}},...extra};}
function noLegend(o){o.plugins.legend.display=false;return o;}
function donutOpts(){return{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'right',labels:{boxWidth:10,padding:12}},tooltip:{backgroundColor:'#0f172a',borderColor:'#334155',borderWidth:1}}};}

function statusBadge(s){return `<span class="status-badge ${s}">${s}</span>`;}
function travelBadge(t){const l={yes:'Sponsored',partial:'Maybe',no:'Not Covered',unknown:'Unknown'};const c=t||'unknown';return `<span class="travel-badge ${c}">${l[c]||'Unknown'}</span>`;}
function scoreBar(score){const p=Math.round(score*100);const c=score>=0.6?GREEN:score>=0.4?AMBER:TICK;return `<div class="score-bar"><div class="score-bar-track"><div class="score-bar-fill" style="width:${p}%;background:${c}"></div></div><span class="score-bar-val" style="color:${c}">${p}%</span></div>`;}
function deadlineClass(d){if(!d)return '';const diff=(new Date(d)-new Date())/(1000*60*60*24);if(diff<0)return 'expired';if(diff<=7)return 'deadline-urgent';if(diff<=14)return 'deadline-soon';return 'deadline-ok';}
function daysUntil(d){if(!d)return '';const diff=Math.ceil((new Date(d)-new Date())/(1000*60*60*24));if(diff<0)return 'Expired';if(diff===0)return 'Today!';if(diff===1)return 'Tomorrow';return diff+'d left';}
function fmtDate(iso){if(!iso)return '\u2014';try{return new Date(iso).toLocaleDateString('en-NG',{month:'short',day:'numeric',year:'numeric'});}catch{return iso;}}

// Build the "I Submitted This" URL — opens GitHub Actions with pre-filled params
function markSubmittedUrl(appId){
  return `https://github.com/${REPO}/actions/workflows/update-status.yml?` +
    new URLSearchParams({
      'workflow_dispatch[inputs][app_id]': appId,
      'workflow_dispatch[inputs][new_status]': 'submitted',
    }).toString();
}

/* ── Data Loading ─────────────── */
async function loadData(){
  document.getElementById('dash-overview').innerHTML='<div class="loading-overlay"><div class="spinner"></div>Loading...</div>';
  try{
    const r=await fetch(DATA_URL+'?t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    DATA=await r.json();
    updateBadges();renderAll();
  }catch(err){
    document.getElementById('dash-overview').innerHTML=`<div class="fetch-error"><p style="font-size:18px;margin-bottom:8px">No data yet</p><p>Run the <a href="https://github.com/${REPO}/actions/workflows/crawl-and-score.yml" target="_blank" class="cfp-link">Crawl CFPs workflow</a> first.</p><p style="margin-top:8px;font-size:12px;color:var(--muted)">${err.message}</p></div>`;
  }
}
function updateBadges(){
  if(!DATA)return;const s=DATA.summary||{};
  document.getElementById('badge-status').textContent=`${s.total_applications||0} Drafts \u00B7 ${s.submitted||0} Submitted`;
  document.getElementById('badge-crawl').textContent=`${s.open_cfps||0} Open CFPs`;
  document.getElementById('last-update-sidebar').textContent='Last crawl: '+fmtDate(s.last_crawled);
}

function renderAll(){if(!DATA)return;renderOverview();renderBoard();renderDeadlines();}

/* ── Overview ─────────────────── */
function renderOverview(){
  const s=DATA.summary||{};
  const apps=DATA.applications||[];
  const talkPerf=DATA.talk_performance||[];
  const tags=DATA.tag_cloud||[];
  const sources=DATA.source_breakdown||[];

  const el=document.getElementById('dash-overview');
  el.innerHTML=`
    <div class="kpi-row">
      <div class="kpi-card"><div class="kpi-label">Open CFPs</div><div class="kpi-value gold">${s.open_cfps||0}</div><div class="kpi-delta">${s.total_cfps_discovered||0} total discovered</div></div>
      <div class="kpi-card"><div class="kpi-label">Drafts Ready</div><div class="kpi-value blue">${s.drafts||0}</div><div class="kpi-delta">Tailored proposals ready to submit</div></div>
      <div class="kpi-card"><div class="kpi-label">Submitted</div><div class="kpi-value amber">${s.submitted||0}</div><div class="kpi-delta">Awaiting response</div></div>
      <div class="kpi-card"><div class="kpi-label">Accepted</div><div class="kpi-value green">${s.accepted||0}</div><div class="kpi-delta">${s.acceptance_rate||0}% acceptance rate</div></div>
      <div class="kpi-card"><div class="kpi-label">Travel Sponsored</div><div class="kpi-value green">${s.travel_yes||0}</div><div class="kpi-delta">${s.travel_partial||0} possible</div></div>
    </div>

    <div class="section-heading">Outcomes</div>
    <div class="chart-row cols-3">
      <div class="chart-card"><div class="chart-header"><span class="chart-title">Application Pipeline</span></div><div class="chart-wrap"><canvas id="c-pipeline" height="180"></canvas></div></div>
      <div class="chart-card"><div class="chart-header"><span class="chart-title">CFP Sources</span></div><div class="chart-wrap"><canvas id="c-sources" height="180"></canvas></div></div>
      <div class="chart-card"><div class="chart-header"><span class="chart-title">Talk Distribution</span></div><div class="chart-wrap" style="min-height:180px"><canvas id="c-talks"></canvas></div></div>
    </div>

    <div class="section-heading" style="margin-top:8px">Urgent \u2014 Deadlines This Week</div>
    <div class="chart-card" style="overflow-x:auto">
      ${(()=>{
        const urgent=apps.filter(a=>a.status==='draft'&&a.deadline).sort((a,b)=>a.deadline.localeCompare(b.deadline)).filter(a=>{const d=Math.ceil((new Date(a.deadline)-new Date())/(86400000));return d>=0&&d<=7;});
        if(!urgent.length)return '<div style="padding:20px;text-align:center;color:var(--muted)">No deadlines in the next 7 days</div>';
        return '<table class="data-table"><thead><tr><th>Conference</th><th>Your Talk</th><th>Deadline</th><th>Travel</th><th>Action</th></tr></thead><tbody>'+urgent.map(a=>`<tr><td><a class="cfp-link" href="${a.cfp_url}" target="_blank">${a.cfp_title}</a></td><td style="font-size:11px;max-width:220px;white-space:normal">${a.talk_title}</td><td class="deadline-urgent" style="font-family:var(--font-head)">${daysUntil(a.deadline)}</td><td>${travelBadge(a.travel_sponsorship)}</td><td><a class="action-btn apply" href="${a.cfp_url}" target="_blank">Apply \u2192</a></td></tr>`).join('')+'</tbody></table>';
      })()}
    </div>`;

  // Pipeline donut
  makeChart('c-pipeline',{type:'doughnut',data:{labels:['Drafts','Submitted','Accepted','Rejected'].filter((_,i)=>[s.drafts,s.submitted,s.accepted,s.rejected][i]>0),datasets:[{data:[s.drafts,s.submitted,s.accepted,s.rejected].filter(v=>v>0),backgroundColor:['#475569',BLUE,GREEN,RED],borderWidth:0}]},options:{...donutOpts(),cutout:'65%'}});

  // Sources
  makeChart('c-sources',{type:'doughnut',data:{labels:sources.map(s=>s.source),datasets:[{data:sources.map(s=>s.count),backgroundColor:[GOLD,PURPLE,BLUE,GREEN,AMBER,RED,CYAN,'#475569','#7c3aed'],borderWidth:0}]},options:donutOpts()});

  // Talks bar
  const tShort=talkPerf.map(t=>t.title.length>25?t.title.slice(0,23)+'...':t.title);
  makeChart('c-talks',{type:'bar',data:{labels:tShort,datasets:[{label:'Applications',data:talkPerf.map(t=>t.applications),backgroundColor:GOLD}]},options:noLegend({...baseOpts({maintainAspectRatio:false}),indexAxis:'y'})});
}

/* ── Action Board (THE main page) ── */
let boardFilter='all';
function renderBoard(){
  const apps=DATA.applications||[];
  const s=DATA.summary||{};

  const el=document.getElementById('dash-board');

  // Filter
  let filtered=apps;
  if(boardFilter==='draft')filtered=apps.filter(a=>a.status==='draft');
  else if(boardFilter==='submitted')filtered=apps.filter(a=>a.status==='submitted');
  else if(boardFilter==='accepted')filtered=apps.filter(a=>a.status==='accepted');
  else if(boardFilter==='travel')filtered=apps.filter(a=>a.travel_sponsorship==='yes'||a.travel_sponsorship==='partial');
  else if(boardFilter==='urgent')filtered=apps.filter(a=>{if(!a.deadline||a.status!=='draft')return false;const d=Math.ceil((new Date(a.deadline)-new Date())/86400000);return d>=0&&d<=14;});

  // Sort: drafts first (by deadline urgency), then submitted, then rest
  filtered.sort((a,b)=>{
    const order={draft:0,submitted:1,accepted:2,rejected:3,expired:4};
    const oa=order[a.status]??5,ob=order[b.status]??5;
    if(oa!==ob)return oa-ob;
    if(a.deadline&&b.deadline)return a.deadline.localeCompare(b.deadline);
    return (b.score||0)-(a.score||0);
  });

  el.innerHTML=`
    <div class="filter-bar">
      <span style="font-size:11px;color:var(--muted);margin-right:4px">Filter:</span>
      ${['all','draft','submitted','accepted','travel','urgent'].map(f=>`<button class="filter-btn ${boardFilter===f?'active':''}" onclick="boardFilter='${f}';renderBoard()">${f==='all'?'All ('+apps.length+')':f==='draft'?'Ready to Submit ('+apps.filter(a=>a.status==='draft').length+')':f==='submitted'?'Submitted ('+apps.filter(a=>a.status==='submitted').length+')':f==='accepted'?'Accepted ('+apps.filter(a=>a.status==='accepted').length+')':f==='travel'?'Travel Sponsored':f==='urgent'?'Urgent (< 14 days)':f}</button>`).join('')}
    </div>

    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Showing ${filtered.length} of ${apps.length} applications</div>

    <div class="chart-card" style="overflow-x:auto">
      ${filtered.length===0?'<div style="padding:30px;text-align:center;color:var(--muted)">No applications match this filter</div>':`
      <table class="data-table">
        <thead><tr>
          <th>Conference</th>
          <th>Your Tailored Talk</th>
          <th>Why This Topic</th>
          <th>Deadline</th>
          <th>Travel</th>
          <th>Status</th>
          <th>Actions</th>
        </tr></thead>
        <tbody>${filtered.map(a=>{
          const isDraft=a.status==='draft';
          const isSubmitted=a.status==='submitted';
          return `<tr>
            <td>
              <a class="cfp-link" href="${a.cfp_url}" target="_blank">${(a.cfp_title||'').slice(0,35)}</a>
              <div style="font-size:10px;color:var(--muted);margin-top:2px">${a.cfp_source} \u00B7 ${a.event_location||'Online'}</div>
            </td>
            <td style="font-size:11px;max-width:220px;white-space:normal;font-weight:500">${a.talk_title||'\u2014'}</td>
            <td style="font-size:10px;max-width:180px;white-space:normal;color:var(--muted)">${a.match_reason||'\u2014'}</td>
            <td style="white-space:nowrap">
              <span class="${deadlineClass(a.deadline)}">${a.deadline||'\u2014'}</span>
              <div style="font-size:10px;color:var(--muted)">${daysUntil(a.deadline)}</div>
            </td>
            <td>${travelBadge(a.travel_sponsorship)}</td>
            <td>${statusBadge(a.status)}</td>
            <td style="white-space:nowrap">
              ${isDraft?`
                <a class="action-btn apply" href="${a.cfp_url}" target="_blank">Apply \u2192</a>
                <a class="action-btn submit" href="https://github.com/${REPO}/actions/workflows/update-status.yml" target="_blank" title="After submitting, click here to update status" style="margin-left:4px">I Submitted</a>
              `:isSubmitted?`
                <a class="action-btn done">Awaiting \u23F3</a>
              `:`
                ${statusBadge(a.status)}
              `}
            </td>
          </tr>`;
        }).join('')}</tbody>
      </table>`}
    </div>

    <div style="margin-top:16px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--muted);line-height:1.8">
      <strong style="color:var(--gold)">How it works:</strong>
      1. Click <strong>"Apply \u2192"</strong> to open the CFP submission page.
      2. Copy the talk title & abstract from this table into the form.
      3. After submitting, click <strong>"I Submitted"</strong> \u2192 it opens GitHub Actions \u2192 click "Run workflow" with the app ID pre-filled.
    </div>`;
}

/* ── Deadlines ────────────────── */
function renderDeadlines(){
  const deadlines=DATA.upcoming_deadlines||[];
  const el=document.getElementById('dash-deadlines');
  el.innerHTML=`
    <div class="section-heading">Upcoming CFP Deadlines (${deadlines.length})</div>
    <div class="chart-card" style="overflow-x:auto">
      ${deadlines.length===0?'<div style="text-align:center;padding:40px;color:var(--muted)">No upcoming deadlines</div>':`
      <table class="data-table">
        <thead><tr><th>#</th><th>Conference</th><th>Location</th><th>Deadline</th><th>Days Left</th><th>Score</th><th>Travel</th><th>Link</th></tr></thead>
        <tbody>${deadlines.map((d,i)=>`<tr>
          <td style="color:var(--muted);font-family:var(--font-head)">${i+1}</td>
          <td style="font-weight:500">${d.title}</td>
          <td style="font-size:11px">${d.location||'\u2014'}</td>
          <td class="${deadlineClass(d.deadline)}" style="font-family:var(--font-head)">${d.deadline}</td>
          <td class="${deadlineClass(d.deadline)}" style="font-family:var(--font-head);font-weight:600">${daysUntil(d.deadline)}</td>
          <td>${scoreBar(d.score||0)}</td>
          <td>${travelBadge(d.travel_sponsorship)}</td>
          <td><a class="cfp-link" href="${d.url}" target="_blank">Open \u2192</a></td>
        </tr>`).join('')}</tbody>
      </table>`}
    </div>
    <div class="chart-row" style="grid-template-columns:1fr;margin-top:20px">
      <div class="chart-card"><div class="chart-header"><span class="chart-title">Deadline Timeline</span></div><div class="chart-wrap"><canvas id="c-dl-timeline" height="160"></canvas></div></div>
    </div>`;
  if(deadlines.length>0){
    const labels=deadlines.map(d=>d.title.slice(0,20));
    const daysData=deadlines.map(d=>Math.max(0,Math.ceil((new Date(d.deadline)-new Date())/86400000)));
    const colors=daysData.map(d=>d<=7?RED:d<=14?AMBER:GREEN);
    makeChart('c-dl-timeline',{type:'bar',data:{labels,datasets:[{label:'Days left',data:daysData,backgroundColor:colors}]},options:noLegend({...baseOpts(),indexAxis:'y'})});
  }
}

/* ── Tab Switching ─────────────── */
const tabNames={overview:'Overview',board:'Action Board',deadlines:'Deadlines'};
function switchTab(name){
  document.querySelectorAll('.dashboard').forEach(d=>d.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active'));
  document.querySelectorAll('.mobile-nav-item').forEach(i=>i.classList.remove('active'));
  const dash=document.getElementById('dash-'+name);if(dash)dash.classList.add('active');
  const si=document.querySelector(`.sidebar-item[data-tab="${name}"]`);if(si)si.classList.add('active');
  const mi=document.querySelector(`.mobile-nav-item[data-tab="${name}"]`);if(mi)mi.classList.add('active');
  document.getElementById('topbar-title').textContent=tabNames[name]||name;
  window.scrollTo({top:0,behavior:'smooth'});
}

loadData();
</script>
